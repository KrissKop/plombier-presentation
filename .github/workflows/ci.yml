name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Start server and check health endpoint
        run: |
          node server/index.js &
          npx wait-on http://localhost:3000/api/health -t 10000
          curl -sf http://localhost:3000/api/health
