services:
  - type: web
    name: plombier-presentation
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: TO_EMAIL
        sync: false
      - key: ADMIN_TOKEN
        sync: false
